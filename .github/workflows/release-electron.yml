name: Release Electron

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-electron-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: electron:publish:mac
          - platform: win
            os: windows-latest
            script: electron:publish:win
          - platform: linux
            os: ubuntu-latest
            script: electron:publish:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release version
        run: bun run scripts/verify-release-version.ts "${{ inputs.tag || github.ref_name }}"

      - name: Build and publish
        run: bun run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CRAFT_SKIP_DEV_TOOLS: "1"
