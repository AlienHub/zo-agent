name: Release Electron

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-electron-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: electron:publish:mac
          - platform: win
            os: windows-latest
            script: electron:publish:win
          - platform: linux
            os: ubuntu-latest
            script: electron:publish:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release version
        run: bun run scripts/verify-release-version.ts "${{ inputs.tag || github.ref_name }}"

      - name: Build and publish
        run: bun run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CRAFT_SKIP_DEV_TOOLS: "1"
          # macOS code signing: base64-encoded Developer ID Application .p12
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          # macOS notarization: Apple ID flow
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
          # macOS notarization: App Store Connect API key flow (preferred for CI)
          APPLE_API_KEY: ${{ matrix.platform == 'mac' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'mac' && secrets.APPLE_API_ISSUER || '' }}

  # Set the GitHub Release changelog. The build jobs create the release
  # (electron-builder `--publish always`); this job overwrites its body.
  #
  # Notes are sourced in priority order:
  #   1. A hand-authored file at `.github/release-notes/<tag>.md` (preferred —
  #      lets us ship curated, categorized notes like upstream).
  #   2. Otherwise, an auto-generated changelog from `git log` since the
  #      previous tag (fallback so a release never ships with an empty body).
  release-notes:
    name: release-notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using hand-authored release notes: ${NOTES_FILE}"
            cp "$NOTES_FILE" RELEASE_NOTES.md
          else
            echo "No ${NOTES_FILE}; generating changelog from commits."
            PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            if [ -n "$PREV" ]; then
              RANGE="${PREV}..${TAG}"
              HEADER="Changes since ${PREV}"
            else
              RANGE="$TAG"
              HEADER="Changes"
            fi
            {
              echo "## ${HEADER}"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$RANGE"
              echo
              echo
              echo "_Full history: ${PREV:+https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}}_"
            } > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file RELEASE_NOTES.md
